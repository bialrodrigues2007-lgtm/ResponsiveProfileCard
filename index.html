<!DOCTYPE html>
<html lang="br">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design de interface do usuário</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="profile-card">
        <div class="image">
            <img src="img/image.png" alt="" class="profile-img">
        </div>

        <div class="text-data">
            <span class="name">Condinglab</span>
            <span class="job">Youtuber & Blogger</span>
        </div>

        <div class="media-buttons">
            <a href="#"  id="facebook" class="social-networks">
                <i class='bx bxl-facebook'></i>
            </a>

            <a href="#" id="instagram" class="social-networks">
                <i class='bx bxl-instagram'></i>
            </a>

            <a href="#" id="twitter"class="social-networks">
                <i class='bx bxl-twitter'></i>
            </a>

            <a href="#" id="youtube"class="social-networks">
                <i class='bx bxl-youtube'></i>
            </a>
        </div>

        <div class="buttons">
            <button class="button">Subscribe</button>
            <button class="button">Message</button>
        </div>

        <div class="analytics">
            <div class="data">
                <i class='bx bx-heart'></i>
                <span class="number">60k</span>
            </div>

                <div class="data">
                    <i class='bx bx-message-rounded'></i>
                    <span class="number">10k</span>
                </div>

                    <div class="data">
                        <i class='bx bx-share'></i>
                        <span class="number">30k</span>
                    </div>
            </div>
        </div>
</body>

</html>
